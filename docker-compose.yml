services:
  mysql:
    image: mysql:8.4
    container_name: smart-citizen-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: smart_citizen_portal
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3307:3306"
    volumes:
      - smart_citizen_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  smart_citizen_mysql:
